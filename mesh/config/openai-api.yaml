# OpenAI API (Direct) — Pay-per-token fallback
system:
  name: openai-api
  display_name: "OpenAI API"
  role: "Direct API access to GPT/o-series models — fallback when Codex CLI unavailable"
  version: "GPT-5.4 / o3 / o4-mini"

auth:
  method: api_key
  provider: openai
  plan: "Pay-per-token"
  api_key_env: OPENAI_API_KEY
  api_key_source: "~/.openclaw/auth-profiles.json (openai:default)"
  cost_model: per_token

runtime:
  endpoint: "https://api.openai.com/v1"
  config_files:
    - ~/.openclaw/auth-profiles.json
  context_window: 200000
  default_context: 128000

models:
  gpt-5.4:
    name: "GPT-5.4"
    context: 200000
    pricing:
      input: 0.005
      output: 0.015
    use_for: "Advanced coding/reasoning — prefer Codex CLI instead"
  gpt-5.2:
    name: "GPT-5.2"
    context: 200000
    pricing:
      input: 0.003
      output: 0.012
    use_for: "General purpose"
  gpt-5.1:
    name: "GPT-5.1"
    context: 200000
    pricing:
      input: 0.002
      output: 0.008
    use_for: "Cost-effective general"
  gpt-5:
    name: "GPT-5"
    context: 200000
    pricing:
      input: 0.002
      output: 0.008
    use_for: "Legacy GPT-5"
  gpt-4.1:
    name: "GPT-4.1"
    context: 128000
    pricing:
      input: 0.002
      output: 0.008
    use_for: "Budget option"
  o3:
    name: "o3"
    context: 200000
    pricing:
      input: 0.010
      output: 0.040
    use_for: "Advanced reasoning — expensive"
  o3-pro:
    name: "o3-pro"
    context: 200000
    pricing:
      input: 0.020
      output: 0.080
    use_for: "CRITICAL reasoning ONLY — VERY EXPENSIVE"
  o4-mini:
    name: "o4-mini"
    context: 200000
    pricing:
      input: 0.001
      output: 0.004
    use_for: "Cheapest reasoning model"
  o1:
    name: "o1"
    context: 200000
    pricing:
      input: 0.015
      output: 0.060
    use_for: "Legacy reasoning"
  o1-pro:
    name: "o1-pro"
    context: 200000
    pricing:
      input: 0.020
      output: 0.080
    use_for: "CRITICAL reasoning ONLY — VERY EXPENSIVE"

capabilities:
  primary:
    - coding
    - reasoning
    - analysis
  secondary:
    - multimodal
    - document_generation
  cannot:
    - background_tasks
    - mcp_access
    - file_operations
    - bash_execution
    - web_search

cost_routing:
  priority_for:
    coding: 9         # EXPENSIVE — use Codex CLI instead
    research: 10      # Use Perplexity instead
    reasoning: 9      # Use Codex CLI instead (same models, $0)
    long_context: 8   # Use Gemini instead
    quick_answers: 8  # Use OpenClaw/Gemini instead
    multimodal: 8     # Use Gemini instead
  never_use_for:
    - background_monitoring
  notes: "LAST RESORT for OpenAI models — Codex CLI does the same for $0"

limits:
  daily: null
  monthly: null
  alert_threshold_daily: 5.00
  notes: "Pay-per-token — prefer Codex CLI ($0 subscription)"

health_check:
  type: api_ping
  endpoint: "https://api.openai.com/v1/models"
  method: "GET"
  expected: "api_key required or 200"
